<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Haider Collection</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8f6f3 0%, #e8e3db 100%);
            padding: 20px;
        }
        
        .error-content {
            text-align: center;
            max-width: 600px;
        }
        
        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: clamp(8rem, 20vw, 15rem);
            font-weight: 700;
            color: var(--primary-color);
            line-height: 1;
            margin: 0;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.1);
        }
        
        .error-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--secondary-color);
            margin: 20px 0;
        }
        
        .error-message {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .error-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 35px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.3);
        }
        
        .btn-home:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 115, 85, 0.4);
        }
        
        .btn-contact {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 35px;
            background: white;
            color: var(--primary-color);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            border: 2px solid var(--primary-color);
            transition: all 0.3s;
        }
        
        .btn-contact:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }
        
        .decorative-icon {
            font-size: 4rem;
            color: var(--primary-color);
            opacity: 0.3;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .error-actions {
                flex-direction: column;
                width: 100%;
            }
            
            .btn-home,
            .btn-contact {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <i class="fas fa-shopping-bag decorative-icon"></i>
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Page Not Found</h2>
            <p class="error-message">
                Oops! The page you're looking for doesn't exist. It might have been moved or deleted.
                <br>Let's get you back to shopping!
            </p>
            <div class="error-actions">
                <a href="/" class="btn-home">
                    <i class="fas fa-home"></i>
                    Back to Home
                </a>
                <a href="https://wa.me/923135591513?text=Hi%20Haider%20Collection%20I%20need%20help" class="btn-contact" target="_blank">
                    <i class="fab fa-whatsapp"></i>
                    Contact Us
                </a>
            </div>
        </div>
    </div>
</body>
</html>
