<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Haider Collection</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .cart-container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }
        .cart-item {
            display: grid;
            grid-template-columns: 150px 1fr auto auto;
            gap: 20px;
            padding: 20px;
            border-bottom: 1px solid #eee;
            align-items: center;
        }
        .cart-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }
        .item-details h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .quantity-btn {
            width: 30px;
            height: 30px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 4px;
        }
        .quantity-btn:hover {
            background: #f5f5f5;
        }
        .cart-summary {
            background: #f8f6f3;
            padding: 30px;
            border-radius: 10px;
            margin-top: 30px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        .summary-row.total {
            font-size: 1.5rem;
            font-weight: bold;
            padding-top: 15px;
            border-top: 2px solid #ddd;
        }
        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
        }
        .checkout-btn:hover {
            background: var(--secondary-color);
        }
        .empty-cart {
            text-align: center;
            padding: 100px 20px;
        }
        .empty-cart i {
            font-size: 5rem;
            color: #ddd;
            margin-bottom: 20px;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .cart-container {
                margin: 30px auto;
                padding: 0 15px;
            }

            .cart-container h1 {
                font-size: 2rem;
                margin-bottom: 20px;
            }

            .cart-item {
                grid-template-columns: 100px 1fr;
                gap: 15px;
                padding: 15px;
            }

            .cart-item img {
                height: 120px;
            }

            .item-details h3 {
                font-size: 1.1rem;
            }

            .item-details p {
                font-size: 0.9rem;
            }

            .quantity-controls {
                margin-top: 10px;
                justify-content: flex-start;
            }

            .cart-item > div:last-child {
                grid-column: 1 / -1;
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 10px;
                padding-top: 10px;
                border-top: 1px solid #eee;
            }

            .cart-summary {
                padding: 20px;
            }

            .summary-row {
                font-size: 1rem;
            }

            .summary-row.total {
                font-size: 1.3rem;
            }

            .checkout-btn {
                padding: 12px;
                font-size: 1rem;
            }

            .empty-cart {
                padding: 60px 20px;
            }

            .empty-cart i {
                font-size: 4rem;
            }

            .empty-cart h2 {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .cart-container h1 {
                font-size: 1.7rem;
            }

            .cart-item {
                grid-template-columns: 80px 1fr;
                gap: 12px;
                padding: 12px;
            }

            .cart-item img {
                height: 100px;
            }

            .item-details h3 {
                font-size: 1rem;
            }

            .quantity-btn {
                width: 28px;
                height: 28px;
                font-size: 0.9rem;
            }
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="/" style="text-decoration: none; color: inherit;">
                    <h1>Haider <span>Collection</span></h1>
                    <p class="tagline">Luxury Fashion for the Modern Woman</p>
                </a>
            </div>
            
            <nav class="nav">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/#new-arrivals">New Arrivals</a></li>
                    <li><a href="/#categories">Collections</a></li>
                    <li><a href="/#featured">Featured</a></li>
                    <li><a href="/#contact">Contact</a></li>
                </ul>
            </nav>
            
            <div class="header-actions">
                <a href="/cart.html" class="cart-icon">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count">0</span>
                </a>
            </div>
        </div>
    </header>

    <div class="cart-container">
        <h1 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 30px;">Shopping Cart</h1>
        
        <div id="cart-items"></div>
        <div id="empty-cart" class="empty-cart" style="display: none;">
            <i class="fas fa-shopping-bag"></i>
            <h2>Your cart is empty</h2>
            <p>Add some items to get started!</p>
            <a href="/" class="btn-primary" style="display: inline-block; margin-top: 20px;">Continue Shopping</a>
        </div>

        <div id="cart-summary" class="cart-summary" style="display: none;">
            <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 20px;">Order Summary</h2>
            <div class="summary-row">
                <span>Subtotal:</span>
                <span id="subtotal">PKR 0.00</span>
            </div>
            <div class="summary-row">
                <span>Shipping:</span>
                <span>Free</span>
            </div>
            <div class="summary-row total">
                <span>Total:</span>
                <span id="total">PKR 0.00</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
        </div>
    </div>

    <script src="/js/cart.js"></script>
</body>
</html>
